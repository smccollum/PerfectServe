<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg: #F4F5F7; --surface: #FFF; --surface-hover: #F9FAFB;
    --border: #E2E4E9; --border-light: #EDEEF1;
    --text: #1A1D23; --text-sec: #6B7280; --text-tri: #9CA3AF;
    --accent: #2563EB; --accent-light: #EFF6FF;
    --nav-bg: #1E293B; --nav-text: #CBD5E1; --nav-active: #FFF;
    --vacation: #DC2626; --instruction: #2563EB;
    --weekend-bg: #F8FAFC; --today-bg: #EFF6FF;
    --tag-day: #1D4ED8; --tag-day-bg: #DBEAFE;
    --tag-night: #6D28D9; --tag-night-bg: #EDE9FE;
    --tag-wknd: #047857; --tag-wknd-bg: #D1FAE5;
    --tag-allday: #047857; --tag-allday-bg: #D1FAE5;
    --tag-exc: #B45309; --tag-exc-bg: #FEF3C7;
    --shadow: 0 1px 3px rgba(0,0,0,0.06); --radius: 6px;
  }
  [data-theme="dark"] {
    --bg: #0F1117; --surface: #181A20; --surface-hover: #1E2028;
    --border: #2A2D36; --border-light: #22252E;
    --text: #E5E7EB; --text-sec: #9CA3AF; --text-tri: #6B7280;
    --accent-light: #1E293B; --weekend-bg: #13151B; --today-bg: #172036;
    --nav-bg: #0B0D12;
    --tag-day: #93C5FD; --tag-day-bg: #1E3A5F;
    --tag-night: #C4B5FD; --tag-night-bg: #2E1065;
    --tag-wknd: #6EE7B7; --tag-wknd-bg: #064E3B;
    --tag-allday: #6EE7B7; --tag-allday-bg: #064E3B;
    --tag-exc: #FCD34D; --tag-exc-bg: #451A03;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.4;-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* Nav */
  .nav{background:var(--nav-bg);color:var(--nav-text);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;flex-shrink:0}
  .nav-left{display:flex;align-items:center;gap:20px}
  .nav-brand{font-size:13px;font-weight:700;color:var(--nav-active)}
  .nav-tabs{display:flex;gap:2px}
  .nav-tab{font-size:12px;font-weight:500;padding:10px 12px;color:var(--nav-text);cursor:pointer;border-bottom:2px solid transparent}
  .nav-tab:hover{color:var(--nav-active)}
  .nav-tab.active{color:var(--nav-active);border-bottom-color:var(--accent)}
  .nav-right{display:flex;gap:8px}
  .nbtn{font-family:inherit;font-size:11px;font-weight:500;padding:5px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.15);background:0;color:var(--nav-text);cursor:pointer;display:flex;align-items:center;gap:4px}
  .nbtn:hover{background:rgba(255,255,255,.08);color:var(--nav-active)}

  /* Toolbar */
  .toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .tl{display:flex;align-items:center;gap:10px}
  .tr{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text-sec)}
  .tr strong{color:var(--text);font-weight:600}
  select{font-family:inherit;font-size:12px;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
  .mnav{display:flex;align-items:center;gap:6px}
  .mnav button{font-size:14px;width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .mnav button:hover{background:var(--surface-hover)}
  .mlabel{font-size:13px;font-weight:600;min-width:110px;text-align:center}

  /* Main */
  .main{flex:1;display:flex;overflow:hidden}

  /* Left Panel */
  .lp{width:260px;min-width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
  .lp-head{padding:8px 12px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tri);border-bottom:1px solid var(--border-light);flex-shrink:0}
  .lp-team{padding:2px 12px 6px;font-size:14px;font-weight:600;flex-shrink:0}
  .el{flex:1;overflow-y:auto}

  /* Ultra-dense event rows */
  .ed{display:flex;align-items:flex-start;gap:0;padding:3px 10px 3px 6px;border-bottom:1px solid var(--border-light);min-height:24px}
  .ed:hover{background:var(--surface-hover)}
  .ed.wk{background:var(--weekend-bg)}
  .edl{width:34px;flex-shrink:0;padding-top:1px}
  .edl .dn{font-size:13px;font-weight:700;color:var(--text-sec);line-height:1}
  .edl .dw{font-size:9px;color:var(--text-tri);text-transform:uppercase;letter-spacing:.02em}
  .edc{flex:1;display:flex;flex-wrap:wrap;gap:0 8px;align-items:baseline}
  .ev{font-size:12px;font-weight:500;line-height:1.5;white-space:nowrap}
  .ev.vac{color:var(--vacation);font-weight:400;font-style:italic;font-size:11px}
  .ev.ins{color:var(--instruction);font-weight:400;font-size:10.5px}
  .ev.emp{color:var(--text-tri);font-weight:400}
  .ev-sep{color:var(--text-tri);font-size:10px}

  /* Right Panel */
  .rp{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .rp-grid{flex:1;padding:8px 12px 0;overflow-y:auto}
  .chr{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tri);padding-bottom:4px;border-bottom:1px solid var(--border)}
  .cg{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border)}
  .cc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:80px;padding:3px 4px;font-size:11px;position:relative}
  .cc:hover{background:var(--surface-hover)}
  .cc.wk{background:var(--weekend-bg)}
  .cc.emp{background:var(--bg)}
  .cdn{font-size:12px;font-weight:600;color:var(--text-sec);margin-bottom:2px}

  .cs{display:flex;align-items:center;gap:2px;padding:1px 0;line-height:1.3}
  .csb{width:3px;min-height:13px;border-radius:1px;flex-shrink:0}
  .csb.day{background:var(--tag-day)}.csb.night{background:var(--tag-night)}.csb.weekend{background:var(--tag-wknd)}.csb.allday{background:var(--tag-allday)}.csb.exception{background:var(--tag-exc)}
  .cst{font-size:10.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .csl{font-size:9px;color:var(--text-tri)}

  /* Notes under calendar */
  .rn{flex-shrink:0;border-top:1px solid var(--border);padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:11px}
  .rn h4{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tri);margin-bottom:3px}
  .rn .nl{padding:1px 0;color:var(--text)}
  .rn textarea{width:100%;min-height:28px;margin-top:2px;font-family:inherit;font-size:11px;border:1px solid var(--border);border-radius:4px;padding:4px 6px;background:var(--bg);color:var(--text);resize:vertical}
  .rn textarea:focus{outline:2px solid var(--accent);border-color:transparent}

  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:0}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MO=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const S={team:'team-4',fac:'st-thomas-midtown',yr:2026,mo:3,theme:'light'};

function render(){
  const t=T[S.team]||T['team-1'];const d=D[S.team]||D['team-1'];
  const dim=new Date(S.yr,S.mo,0).getDate();
  const sdow=new Date(S.yr,S.mo-1,1).getDay();

  document.getElementById('teamSel').innerHTML=Object.entries(T).map(([k,v])=>`<option value="${k}"${k===S.team?' selected':''}>${v.n}</option>`).join('');
  document.getElementById('facSel').innerHTML=t.f.map(f=>`<option value="${f.i}"${f.i===S.fac?' selected':''}>${f.n}${f.m?' ●':''}</option>`).join('');
  document.getElementById('moLbl').textContent=`${MO[S.mo]} ${S.yr}`;
  document.getElementById('lpTeam').textContent=`${t.n} — ${t.ol}`;

  // Left: dense event list
  let lh='';
  for(let i=1;i<=dim;i++){
    const dow=new Date(S.yr,S.mo-1,i).getDay();
    const wk=dow===0||dow===6;
    const evts=(d.o&&d.o[i])||[];
    lh+=`<div class="ed${wk?' wk':''}"><div class="edl"><span class="dn">${i}</span><span class="dw">${DOW[dow]}</span></div><div class="edc">`;
    if(!evts.length){lh+=`<span class="ev emp">—</span>`}
    else{
      evts.forEach((e,idx)=>{
        if(idx>0)lh+=`<span class="ev-sep">·</span>`;
        const c=e.c==='v'?'vac':e.c==='i'?'ins':'';
        lh+=`<span class="ev ${c}">${e.n}</span>`;
      });
    }
    lh+=`</div></div>`;
  }
  document.getElementById('el').innerHTML=lh;

  // Right: calendar grid
  let gh='';
  for(let i=0;i<sdow;i++)gh+=`<div class="cc emp"></div>`;
  for(let i=1;i<=dim;i++){
    const dow=new Date(S.yr,S.mo-1,i).getDay();
    const wk=dow===0||dow===6;
    const sh=(d.p&&d.p[i])||[];
    gh+=`<div class="cc${wk?' wk':''}"><div class="cdn">${i}</div>`;
    sh.forEach(s=>{
      gh+=`<div class="cs"><div class="csb ${s.t}"></div><span class="cst">${s.n}</span><span class="csl">${s.m}</span></div>`;
    });
    gh+=`</div>`;
  }
  const tot=sdow+dim;const trail=(7-(tot%7))%7;
  for(let i=0;i<trail;i++)gh+=`<div class="cc emp"></div>`;
  document.getElementById('cg').innerHTML=gh;

  document.getElementById('fnl').innerHTML=(d.fn||[]).map(n=>`<div class="nl">${n}</div>`).join('');
  document.getElementById('cnl').innerHTML=(d.cn||[]).map(n=>`<div class="nl">${n}</div>`).join('');
}

function chMo(d){S.mo+=d;if(S.mo>12){S.mo=1;S.yr++}if(S.mo<1){S.mo=12;S.yr--}render()}
function toggleTheme(){S.theme=S.theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',S.theme)}
document.getElementById('teamSel').addEventListener('change',e=>{S.team=e.target.value;const t=T[S.team];if(t)S.fac=t.f[0].i;render()});
document.getElementById('facSel').addEventListener('change',e=>{S.fac=e.target.value;render()});
render();
</script>
